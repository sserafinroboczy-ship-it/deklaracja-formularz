<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deklaracja Godzin Pracy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .day-row { transition: all 0.2s; }
        .day-row:hover { background-color: #f0f9ff; }
        .weekend { background-color: #fef2f2; }
        .holiday { background-color: #fef3c7; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-purple-50 min-h-screen">
    <div class="max-w-2xl mx-auto p-4 py-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">📋 Deklaracja Godzin Pracy</h1>
            <p class="text-gray-600">Wypełnij formularz i wyślij deklarację</p>
        </div>

        <!-- Form -->
        <form id="declarationForm" class="bg-white rounded-2xl shadow-xl p-6 space-y-6">
            <!-- Worker Number -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Numer Pracownika *</label>
                <input type="text" id="workerNumber" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    placeholder="np. 12345">
            </div>

            <!-- Worker Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Imię i Nazwisko *</label>
                <input type="text" id="workerName" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    placeholder="Jan Kowalski">
            </div>

            <!-- Month Selection -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Miesiąc *</label>
                <input type="month" id="month" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- Days Container -->
            <div id="daysContainer" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-2">Godziny pracy dla każdego dnia</label>
                <div class="border border-gray-200 rounded-xl overflow-hidden">
                    <div class="grid grid-cols-12 bg-gray-100 p-2 text-sm font-medium text-gray-600">
                        <div class="col-span-1">Dzień</div>
                        <div class="col-span-3">Data</div>
                        <div class="col-span-4">Godziny</div>
                        <div class="col-span-4">Uwagi</div>
                    </div>
                    <div id="daysList" class="max-h-96 overflow-y-auto"></div>
                </div>
                <div class="mt-2 text-sm text-gray-500">
                    <span class="inline-block w-3 h-3 bg-red-100 rounded mr-1"></span> Weekend
                    <span class="inline-block w-3 h-3 bg-yellow-100 rounded mr-1 ml-3"></span> Święto
                </div>
            </div>

            <!-- Total Hours -->
            <div id="totalHours" class="hidden bg-blue-50 rounded-xl p-4">
                <div class="flex justify-between items-center">
                    <span class="font-medium text-gray-700">Suma godzin:</span>
                    <span id="totalValue" class="text-2xl font-bold text-blue-600">0</span>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-6 rounded-xl transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed">
                📤 Wyślij Deklarację
            </button>
        </form>

        <!-- Success Message -->
        <div id="successMessage" class="hidden bg-white rounded-2xl shadow-xl p-8 text-center">
            <div class="text-6xl mb-4">✅</div>
            <h2 class="text-2xl font-bold text-green-600 mb-2">Deklaracja wysłana!</h2>
            <p class="text-gray-600 mb-6">Twoja deklaracja została zapisana pomyślnie.</p>
            <button onclick="location.reload()" 
                class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl">
                Wypełnij kolejną
            </button>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 rounded-xl p-4 mt-4">
            <p class="text-red-600" id="errorText"></p>
        </div>
    </div>

    <script>
        // Google Apps Script URL - UZUPEŁNIJ PO UTWORZENIU SKRYPTU
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwHMj7tTYePECwP9Y5UvhspYxIN-Y1BEE7Cd1L1K56W2oaaONLDmodduwFkOtbHzd3J/exec';

        // Polish holidays (fixed dates)
        const HOLIDAYS_2024 = {
            '01-01': 'Nowy Rok',
            '01-06': 'Trzech Króli',
            '05-01': 'Święto Pracy',
            '05-03': 'Święto Konstytucji',
            '08-15': 'Wniebowzięcie NMP',
            '11-01': 'Wszystkich Świętych',
            '11-11': 'Święto Niepodległości',
            '12-25': 'Boże Narodzenie',
            '12-26': 'Boże Narodzenie'
        };

        const monthInput = document.getElementById('month');
        const daysContainer = document.getElementById('daysContainer');
        const daysList = document.getElementById('daysList');
        const totalHours = document.getElementById('totalHours');
        const totalValue = document.getElementById('totalValue');
        const form = document.getElementById('declarationForm');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        // Set default month to current
        const now = new Date();
        monthInput.value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        monthInput.addEventListener('change', generateDays);
        generateDays();

        function generateDays() {
            const [year, month] = monthInput.value.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            
            daysList.innerHTML = '';
            
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month - 1, day);
                const dayOfWeek = date.getDay();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                const dateStr = `${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isHoliday = HOLIDAYS_2024[dateStr];
                
                const dayNames = ['Nd', 'Pn', 'Wt', 'Śr', 'Cz', 'Pt', 'So'];
                
                let rowClass = 'day-row grid grid-cols-12 p-2 border-b border-gray-100 items-center';
                if (isWeekend) rowClass += ' weekend';
                if (isHoliday) rowClass += ' holiday';
                
                const row = document.createElement('div');
                row.className = rowClass;
                row.innerHTML = `
                    <div class="col-span-1 font-medium">${day}</div>
                    <div class="col-span-3 text-sm text-gray-600">${dayNames[dayOfWeek]}, ${day}.${month}</div>
                    <div class="col-span-4">
                        <input type="number" min="0" max="24" step="0.5" 
                            class="hours-input w-full px-2 py-1 border border-gray-300 rounded text-center"
                            data-day="${day}" value="${isWeekend || isHoliday ? '0' : '8'}"
                            placeholder="0">
                    </div>
                    <div class="col-span-4">
                        <input type="text" 
                            class="notes-input w-full px-2 py-1 border border-gray-300 rounded text-sm"
                            data-day="${day}" placeholder="${isHoliday || ''}"
                            value="${isHoliday || ''}">
                    </div>
                `;
                daysList.appendChild(row);
            }
            
            daysContainer.classList.remove('hidden');
            totalHours.classList.remove('hidden');
            
            // Add event listeners for hours calculation
            document.querySelectorAll('.hours-input').forEach(input => {
                input.addEventListener('input', calculateTotal);
            });
            
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            document.querySelectorAll('.hours-input').forEach(input => {
                total += parseFloat(input.value) || 0;
            });
            totalValue.textContent = total.toFixed(1);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const workerNumber = document.getElementById('workerNumber').value.trim();
            const workerName = document.getElementById('workerName').value.trim();
            const month = monthInput.value;
            
            if (!workerNumber) {
                showError('Wprowadź numer pracownika');
                return;
            }
            
            if (!workerName) {
                showError('Wprowadź imię i nazwisko');
                return;
            }
            
            // Collect days data
            const days = [];
            document.querySelectorAll('.hours-input').forEach(input => {
                const day = input.dataset.day;
                const hours = parseFloat(input.value) || 0;
                const note = document.querySelector(`.notes-input[data-day="${day}"]`).value;
                days.push({ day: parseInt(day), hours, note });
            });
            
            const totalHoursValue = parseFloat(totalValue.textContent);
            
            // Prepare data
            const data = {
                timestamp: new Date().toISOString(),
                workerNumber,
                workerName,
                month,
                totalHours: totalHoursValue,
                days: JSON.stringify(days)
            };
            
            // Disable submit button
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Wysyłanie...';
            
            try {
                // Send to Google Sheets
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                // Show success (no-cors doesn't return response)
                form.classList.add('hidden');
                successMessage.classList.remove('hidden');
                
            } catch (error) {
                showError('Błąd wysyłania: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = '📤 Wyślij Deklarację';
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
            setTimeout(() => errorMessage.classList.add('hidden'), 5000);
        }
    </script>
</body>
</html>
